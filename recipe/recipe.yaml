context:
  version: "0.2.0"

package:
  name: undoc
  version: ${{ version }}

source:
  url: https://github.com/iyulab/undoc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 579e3912e6d8d2078b50fdfffad376c26ef5ea137c0e6b7411cf08939901b5a5

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path cli
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: unix
      then:
        - pkg-config
        - make
  host:
    - if: unix
      then:
        - openssl

tests:
  - script: undoc --help
  - package_contents:
      bin:
        - undoc

about:
  homepage: https://github.com/iyulab/undoc
  summary: High-performance Microsoft Office document extraction to Markdown, text, and JSON
  description: |
    undoc is a high-performance Rust library and CLI tool for extracting
    content from Microsoft Office documents (DOCX, XLSX, PPTX) to structured
    Markdown, plain text, and JSON. It supports structure preservation,
    smart heading detection, table cell alignment, CJK text, asset
    extraction, footnotes/endnotes, and text cleanup presets for LLM
    training data preparation.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.rs/undoc
  repository: https://github.com/iyulab/undoc

extra:
  recipe-maintainers:
    - hadim
